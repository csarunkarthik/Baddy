<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#6366f1" stroke-width="1" fill="none" opacity="0.08">
    <!-- Outer court -->
    <rect x="20" y="50" width="280" height="220" />
    <!-- Singles side lines -->
    <line x1="40" y1="50" x2="40" y2="270" />
    <line x1="280" y1="50" x2="280" y2="270" />
    <!-- Net (center) -->
    <line x1="20" y1="160" x2="300" y2="160" stroke-width="1.5" />
    <!-- Front service lines -->
    <line x1="20" y1="115" x2="300" y2="115" />
    <line x1="20" y1="205" x2="300" y2="205" />
    <!-- Center service line -->
    <line x1="160" y1="115" x2="160" y2="205" />
  </g>
</svg>
